name: ci

# Hosted runners cannot run Apple containers (no nested virtualization
# on macOS arm64 runners), so CI exercises the mocked runtime only.
# Release validation must run on real hardware; platform quirks hosted CI
# cannot reach are also covered by fixture tests.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal image)" || { gofmt -l cmd internal image; exit 1; }
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...
      - name: vet
        run: go vet ./...
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      # Keep the lint version explicit; Dependabot updates the action wrapper.
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2
